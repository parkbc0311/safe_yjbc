<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="apple-touch-icon" href="/icon-bc-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="집가요 BC" />
  <link rel="manifest" href="/manifest-bc.json" />
  <title>집가요! — BC</title>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #EAF4FF;
      --sky2: #D6EAFF;
      --blue: #4A9EE8;
      --blue-light: #85C1F5;
      --blue-dark: #1E6FB5;
      --teal: #00B4D8;
      --lavender: #C77DFF;
      --mint: #06D6A0;
      --ink: #0D1B2E;
      --ink2: #1E3A5F;
      --muted: #6B8FAE;
      --white: #F5FAFF;
      --border: rgba(74,158,232,0.22);
      --shadow: rgba(30,111,181,0.15);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--sky);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 48px) 24px env(safe-area-inset-bottom, 36px);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(74,158,232,0.1) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none; z-index: 0;
    }

    .clouds {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 120px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.7;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .c1 { width: 90px; height: 30px; top: 16px; left: -20px; animation: cloudDrift 22s linear infinite; }
    .c1::before { width: 40px; height: 40px; top: -20px; left: 12px; }
    .c1::after  { width: 30px; height: 30px; top: -14px; left: 42px; }

    .c2 { width: 65px; height: 24px; top: 45px; left: 40%; animation: cloudDrift 28s linear infinite; animation-delay: -10s; opacity: 0.5; }
    .c2::before { width: 30px; height: 30px; top: -16px; left: 8px; }
    .c2::after  { width: 22px; height: 22px; top: -10px; left: 30px; }

    .c3 { width: 110px; height: 36px; top: 8px; left: 55%; animation: cloudDrift 19s linear infinite; animation-delay: -6s; }
    .c3::before { width: 48px; height: 48px; top: -24px; left: 14px; }
    .c3::after  { width: 36px; height: 36px; top: -16px; left: 52px; }

    @keyframes cloudDrift {
      from { transform: translateX(-180px); }
      to   { transform: translateX(calc(100vw + 180px)); }
    }

    .header {
      z-index: 1;
      text-align: center;
      animation: bounceIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .name-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue);
      color: white;
      padding: 4px 14px 4px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      box-shadow: 0 3px 12px var(--shadow);
    }

    .header h1 {
      font-family: 'Gaegu', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.1;
    }

    .header h1 .wave {
      display: inline-block;
      animation: waveHand 1.5s ease-in-out infinite;
      transform-origin: 70% 70%;
    }
    @keyframes waveHand {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(20deg); }
      75%       { transform: rotate(-10deg); }
    }

    .header-sub {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.5;
    }

    .btn-area {
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: bounceIn 0.8s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .house-btn-wrap { position: relative; }

    .bounce-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 3px dashed var(--blue-light);
      opacity: 0;
      animation: bounceRing 2.5s ease-out infinite;
    }
    .bounce-ring:nth-child(2) { inset: -24px; animation-delay: 0.8s; }

    @keyframes bounceRing {
      0%   { opacity: 0.7; transform: scale(0.9); }
      100% { opacity: 0;   transform: scale(1.3); }
    }

    .house-btn {
      position: relative;
      width: 172px; height: 172px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #A8D8FF 0%, var(--blue-light) 50%, var(--blue) 100%);
      box-shadow:
        0 8px 0 var(--blue-dark),
        0 12px 30px var(--shadow),
        inset 0 2px 0 rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .house-btn:active {
      transform: translateY(5px);
      box-shadow:
        0 3px 0 var(--blue-dark),
        0 6px 16px var(--shadow),
        inset 0 2px 0 rgba(255,255,255,0.4);
    }

    .house-emoji {
      font-size: 3.2rem;
      line-height: 1;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.1));
    }

    .house-btn:active .house-emoji { animation: houseWiggle 0.4s ease; }

    @keyframes houseWiggle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25%       { transform: rotate(-8deg) scale(1.1); }
      75%       { transform: rotate(8deg) scale(1.1); }
    }

    .house-label {
      font-family: 'Gaegu', cursive;
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.12);
    }

    .house-sublabel {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.12em;
    }

    .to-label {
      font-family: 'Gaegu', cursive;
      font-size: 1rem;
      color: var(--muted);
    }
    .to-label strong { color: var(--blue-dark); font-weight: 700; }

    .status-area {
      z-index: 1;
      text-align: center;
      animation: bounceIn 0.9s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 100px;
      font-family: 'Gaegu', cursive;
      font-size: 0.95rem;
      color: var(--muted);
      transition: all 0.3s;
      box-shadow: 0 3px 12px var(--shadow);
    }
    .status-pill.success { border-color: var(--mint); color: #07A07A; }
    .status-pill.error   { border-color: #FF6B9D; color: #C0306A; }
    .status-pill.loading { border-color: var(--blue-light); color: var(--blue-dark); }

    .dot-live {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--blue);
      animation: livePulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(0.6); opacity: 0.5; }
    }

    /* Incoming banner */
    .incoming-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 14px;
      background: linear-gradient(135deg, #EAF4FF, #D0E8FF);
      border-bottom: 3px solid var(--blue);
      box-shadow: 0 4px 20px var(--shadow);
      animation: slideDown 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .incoming-banner.show { display: block; }
    @keyframes slideDown {
      from { transform: translateY(-110%); }
      to   { transform: translateY(0); }
    }

    .incoming-inner { display: flex; align-items: center; gap: 12px; }

    .incoming-icon {
      font-size: 2.2rem;
      animation: bounceIcon 0.6s cubic-bezier(0.34,1.56,0.64,1);
      flex-shrink: 0;
    }
    @keyframes bounceIcon {
      from { transform: scale(0) rotate(-20deg); }
      to   { transform: scale(1) rotate(0deg); }
    }

    .incoming-text { flex: 1; }
    .incoming-who { font-family: 'Gaegu', cursive; font-size: 1.15rem; color: var(--ink); font-weight: 700; }
    .incoming-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .incoming-map-btn {
      padding: 8px 14px;
      background: var(--blue);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Gaegu', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 3px 0 var(--blue-dark);
      white-space: nowrap;
    }

    .bottom-area {
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: bounceIn 1s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .reg-btn {
      width: 100%;
      padding: 12px;
      border-radius: 16px;
      border: 2px dashed var(--border);
      background: rgba(255,255,255,0.6);
      font-family: 'Gaegu', cursive;
      font-size: 1rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .reg-btn:active { background: var(--white); }
    .reg-btn.done { border-style: solid; border-color: var(--mint); color: #07A07A; background: rgba(6,214,160,0.06); }

    .log-title { font-family: 'Gaegu', cursive; font-size: 0.9rem; color: var(--muted); text-align: center; margin-top: 2px; }
    .log-list { display: flex; flex-direction: column; gap: 8px; }

    .log-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 3px 10px var(--shadow);
      animation: bounceIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .log-emoji { font-size: 1.4rem; flex-shrink: 0; }
    .log-info  { flex: 1; }
    .log-time  { font-size: 0.68rem; color: var(--muted); }
    .log-msg   { font-family: 'Gaegu', cursive; font-size: 0.95rem; color: var(--ink2); margin-top: 1px; }
    .log-sub   { font-size: 0.82rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }

    .log-map {
      font-size: 0.72rem;
      color: var(--blue-dark);
      text-decoration: none;
      padding: 4px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      white-space: nowrap;
      font-family: 'Gaegu', cursive;
    }

    .log-empty {
      text-align: center;
      padding: 14px;
      font-family: 'Gaegu', cursive;
      font-size: 0.95rem;
      color: var(--muted);
      border: 2px dashed var(--border);
      border-radius: 16px;
    }

    .overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(234,244,255,0.93);
      backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
    }
    .overlay.active { display: flex; }

    .overlay-emoji {
      font-size: 4rem;
      animation: overlayBounce 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes overlayBounce {
      0%   { transform: scale(0) rotate(-30deg); }
      60%  { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--sky2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay-title { font-family: 'Gaegu', cursive; font-size: 2rem; font-weight: 700; color: var(--ink); }
    .overlay-sub { font-family: 'Gaegu', cursive; font-size: 1.05rem; color: var(--muted); text-align: center; line-height: 1.7; }

    @keyframes bounceIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── 롱프레스 긴급 모드 ── */
    .press-progress {
      position: absolute;
      width: 194px; height: 194px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .press-progress.active { opacity: 1; }
    .press-progress circle { fill: none; stroke-width: 6; stroke-linecap: round; }
    .press-progress .bg-ring { stroke: rgba(255,100,0,0.15); }
    .press-progress .fill-ring {
      stroke: #FF4400;
      stroke-dasharray: 503;
      stroke-dashoffset: 503;
    }
    .house-btn.lp-1 {
      background: linear-gradient(145deg, #FFD166, #FFAA55, #FF7733) !important;
      box-shadow: 0 8px 0 #BB4400, 0 12px 30px rgba(255,100,0,0.3), inset 0 2px 0 rgba(255,255,255,0.5) !important;
    }
    .house-btn.lp-2 {
      background: linear-gradient(145deg, #FF7733, #FF3300, #CC1100) !important;
      box-shadow: 0 8px 0 #881100, 0 12px 40px rgba(255,40,0,0.45), inset 0 2px 0 rgba(255,255,255,0.4) !important;
      animation: lpShake 0.3s ease-in-out infinite !important;
    }
    .house-btn.lp-3 {
      background: linear-gradient(145deg, #FF2200, #BB0000, #770000) !important;
      box-shadow: 0 8px 0 #440000, 0 8px 60px rgba(255,0,0,0.6), inset 0 2px 0 rgba(255,255,255,0.3) !important;
      animation: lpShakeFast 0.18s ease-in-out infinite !important;
    }
    .house-btn.lp-done {
      background: linear-gradient(145deg, #FF0000, #880000) !important;
      box-shadow: 0 3px 0 #330000, 0 4px 80px rgba(255,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.2) !important;
      animation: lpBoom 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards !important;
    }
    @keyframes lpShake {
      0%,100% { transform: translateX(0); }
      33%      { transform: translateX(-4px) rotate(-1deg); }
      66%      { transform: translateX(4px)  rotate(1deg); }
    }
    @keyframes lpShakeFast {
      0%,100% { transform: translateX(0) scale(1); }
      25%      { transform: translateX(-6px) rotate(-2deg) scale(1.02); }
      50%      { transform: translateX(6px)  rotate(2deg)  scale(1.03); }
      75%      { transform: translateX(-5px) rotate(-1.5deg) scale(1.02); }
    }
    @keyframes lpBoom {
      0%   { transform: scale(0.9);  }
      45%  { transform: scale(1.14); }
      70%  { transform: scale(0.97); }
      100% { transform: scale(1);    }
    }
    /* 긴급 수신 배너 */
    .incoming-banner.emergency {
      background: linear-gradient(135deg, #EE1111, #AA0000) !important;
      border-bottom-color: #770000 !important;
    }
    .incoming-banner.emergency .incoming-who { color: #fff !important; }
    .incoming-banner.emergency .incoming-desc { color: rgba(255,255,255,0.82) !important; }
    /* 긴급 로그 카드 */
    .log-item.emergency { border-color: #FF4444 !important; background: #FFF5F5 !important; }
  </style>
</head>
<body>

  <div class="clouds">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
  </div>

  <!-- Incoming banner: YJ가 집에 간다고 알림 -->
  <div class="incoming-banner" id="incomingBanner">
    <div class="incoming-inner">
      <div class="incoming-icon">🏃‍♀️</div>
      <div class="incoming-text">
        <div class="incoming-who" id="incomingWho">yj가 집으로 출발했어요!</div>
        <div class="incoming-desc" id="incomingDesc">위치 불러오는 중...</div>
      </div>
      <a class="incoming-map-btn" id="incomingMapBtn" href="#" target="_blank">📍 위치</a>
    </div>
  </div>

  <div class="header">
    <div class="name-tag">👦 BC의 앱</div>
    <h1>병철 집에 간다~! <span class="wave">👋</span></h1>
    <p class="header-sub">버튼 누르면 yj한테 바로 알림 가요<br/>위치도 같이 쏴줌 🗺️</p>
  </div>

  <div class="btn-area">
    <div class="house-btn-wrap">
      <div class="bounce-ring"></div>
      <div class="bounce-ring"></div>
      <!-- 롱프레스 원형 프로그레스 -->
      <svg class="press-progress" id="pressRing" viewBox="0 0 194 194" xmlns="http://www.w3.org/2000/svg">
        <circle class="bg-ring"   cx="97" cy="97" r="80"/>
        <circle class="fill-ring" cx="97" cy="97" r="80" id="pressFill"/>
      </svg>
      <button class="house-btn" id="mainBtn"
        onmousedown="onPressStart()"
        ontouchstart="onPressStart(event)">
        <span class="house-emoji" id="btnEmoji">🏠</span>
        <span class="house-label" id="btnLabel">집에 간다!</span>
        <span class="house-sublabel" id="btnSub">꾹 → 긴급!</span>
      </button>
    </div>
    <div class="to-label">→ <strong>yj</strong> 에게 알림 전송</div>
  </div>

  <div class="status-area">
    <div class="status-pill" id="statusPill">
      <div class="dot-live"></div>
      <span id="statusText">대기 중 ☁️</span>
    </div>
  </div>

  <div class="bottom-area">
    <button class="reg-btn" id="regBtn" onclick="registerToken()">🔔 알림 수신 등록하기</button>

    <div class="log-title">yj가 보낸 알림 📬 <span style="font-size:0.8rem;color:var(--muted);display:block;margin-top:4px;">이 페이지는 yj가 BC에게 보낸 알림을 표시해요.</span></div>
    <div class="log-list" id="logList"></div>
  </div>

  <!-- Overlays -->
  <div class="overlay" id="sendingOverlay">
    <div class="spinner"></div>
    <div class="overlay-title">전송 중... 🚀</div>
    <div class="overlay-sub">GPS 찍는 중이에요<br/>잠깐만요!</div>
  </div>

  <div class="overlay" id="successOverlay" onclick="this.classList.remove('active')">
    <div class="overlay-emoji">🎉</div>
    <div class="overlay-title">전송 완료!</div>
    <div class="overlay-sub" id="successMsg">yj한테 알림 보냈어요~<br/>빨리 집에 가요! 🏃‍♂️💨</div>
    <div style="font-size:0.75rem;color:var(--muted);font-family:'Gaegu',cursive">화면 아무데나 탭하면 닫혀요</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, limit, onSnapshot, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        projectId: "safe-yj",
        storageBucket: "safe-yj.firebasestorage.app",
        messagingSenderId: "431566844297",
        appId: "1:431566844297:web:7736c329a53969a96cb158",
        measurementId: "G-D4VT257P6K"
    };

    const VAPID_KEY = "BDb9OzjdR78hJoTXQg04DG-Z7pH8rNJ-NqvPYEdhsOwuSEc-Oud3Q-_Uvi0H1HjxmYfvJtFcCK6nWS-nntJFPHY";
    const MY_USER = "bc";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const SEND_MSGS = [
      "나 간다~ 기다려! 🏃‍♂️💨",
      "퇴근완료 🫡 집으로 고고",
      "드디어 집에 간다아아 🎊",
      "나 출발~ 밥 차려놔요 🍚",
      "지하철 탔어요~ 곧 가요! 🚇",
      "이제 진짜 간다! (진짜임) 🏠",
      "귀가 시작 🚨 삐용삐용",
    ];

    const RECV_MSGS = [
      "yj가 집으로 달려오는 중이래요! 🏃‍♀️",
      "yj가 퇴근했대요~ 🎉",
      "yj 곧 도착한대요! 🚌💨",
      "yj가 출발했어요! 마중 나갈까요? 👀",
    ];

    // BC가 보낸 이벤트 실시간 감지
    const q = query(
      collection(db, "home_events"),
      where("to", "==", "bc"),
      orderBy("timestamp", "desc"),
      limit(3)
    );

    let firstLoad = true;
    renderEmpty();
    onSnapshot(q, (snap) => {
      if (!snap.empty) {
        renderLog(snap.docs);
        if (!firstLoad) showIncoming(snap.docs[0].data());
      } else {
        renderEmpty();
      }
      firstLoad = false;
    });

    function showIncoming(data) {
      const banner = document.getElementById('incomingBanner');
      const isEmergency = data.emergency === true;
      if (isEmergency) {
        banner.classList.add('emergency');
        document.getElementById('incomingWho').textContent = '🚨 긴급!! 병철이에게 무슨일이 생겼나봐요!! 얼른 전화해보세요!!';
        if (navigator.vibrate) navigator.vibrate([400,100,400,100,400]);
      } else {
        banner.classList.remove('emergency');
        const msg = RECV_MSGS[Math.floor(Math.random() * RECV_MSGS.length)];
        document.getElementById('incomingWho').textContent = msg;
        if (navigator.vibrate) navigator.vibrate([200,80,200]);
      }
      document.getElementById('incomingDesc').textContent =
        data.address
          ? `📍 ${data.address} 근처`
          : `📍 ${Number(data.latitude).toFixed(4)}, ${Number(data.longitude).toFixed(4)}`;
      document.getElementById('incomingMapBtn').href =
        data.mapsUrl || `https://maps.google.com/?q=${data.latitude},${data.longitude}`;
      banner.classList.add('show');
      setTimeout(() => { banner.classList.remove('show'); banner.classList.remove('emergency'); }, isEmergency ? 18000 : 10000);
    }

    function renderLog(docs) {
      const list = document.getElementById('logList');
      list.innerHTML = '';
      docs.forEach(doc => {
        const d = doc.data();
        const t = d.timestamp?.toDate() || new Date();
        const timeStr = t.toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const el = document.createElement('div');
        const isEmerg = d.emergency === true;
        el.className = 'log-item' + (isEmerg ? ' emergency' : '');
        const locationText = d.address
          ? `${d.address} 근처`
          : `위치: ${Number(d.latitude).toFixed(4)}, ${Number(d.longitude).toFixed(4)}`;
        el.innerHTML = `
          <div class="log-emoji">${isEmerg ? '🚨' : '🏠'}</div>
          <div class="log-info">
            <div class="log-time">${timeStr}</div>
            <div class="log-msg">${d.message || 'yj가 집에 간대요!'}</div>
            <div class="log-sub">${locationText}</div>
          </div>
          <a class="log-map" href="${d.mapsUrl}" target="_blank">지도 →</a>
        `;
        list.appendChild(el);
      });
    }

    function renderEmpty() {
      const list = document.getElementById('logList');
      list.innerHTML = `<div class="log-empty">아직 yj가 집에 간다고 안 했네요 🫠<br/>BC가 보낸 알림은 yj 페이지에서 보여요.</div>`;
    }

    // ── 롱프레스: 5초 꾹 → 긴급 ──
    const LP_MS = 5000;
    const CIRC = 2 * Math.PI * 80; // ≈ 502.65
    let isPressed = false, lpRaf = null, lpStart = null;

    window.onPressStart = function(e) {
      if (e && e.cancelable) e.preventDefault();
      isPressed = true;
      lpStart = Date.now();
      document.getElementById('pressRing').classList.add('active');
      document.getElementById('pressFill').style.strokeDashoffset = CIRC;
      lpRaf = requestAnimationFrame(lpTick);
    };

    function lpTick() {
      const elapsed = Date.now() - lpStart;
      const ratio   = Math.min(elapsed / LP_MS, 1);
      const btn     = document.getElementById('mainBtn');
      const emoji   = document.getElementById('btnEmoji');
      const label   = document.getElementById('btnLabel');
      const sub     = document.getElementById('btnSub');
      const fill    = document.getElementById('pressFill');
      const secs    = Math.ceil((LP_MS - elapsed) / 1000);

      // 프로그레스 링 업데이트
      fill.style.strokeDashoffset = CIRC * (1 - ratio);
      fill.style.stroke = `rgb(255,${Math.round(120 * (1 - ratio))},0)`;

      if (ratio < 0.33) {
        btn.className = 'house-btn lp-1';
        emoji.textContent = '😰'; label.textContent = '꾹 누르는 중...'; sub.textContent = `${secs}초 더!`;
        setStatus('loading', '⚠️ 5초 꾹 누르면 긴급!');
      } else if (ratio < 0.66) {
        btn.className = 'house-btn lp-2';
        emoji.textContent = '😱'; label.textContent = '긴급 충전 중!!'; sub.textContent = `${secs}초 더!!`;
        setStatus('error', '🚨 거의 다 됐어요!!');
      } else {
        btn.className = 'house-btn lp-3';
        emoji.textContent = '🚨'; label.textContent = '긴급 발동!!!'; sub.textContent = `${secs}초!!!`;
        setStatus('error', '🚨🚨 손 떼지 마세요!!!');
      }

      if (ratio < 1) {
        lpRaf = requestAnimationFrame(lpTick);
      } else {
        // 5초 완료!
        isPressed = false;
        cancelAnimationFrame(lpRaf);
        btn.className = 'house-btn lp-done';
        emoji.textContent = '🚨'; label.textContent = '긴급 호출!!'; sub.textContent = '전송 중...';
        document.getElementById('pressRing').classList.remove('active');
        if (navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
        doSend(true);
        setTimeout(resetBtn, 5000);
      }
    }

    window.onPressEnd = function() {
      if (!isPressed) return;

      isPressed = false;
      cancelAnimationFrame(lpRaf);

      const elapsed = Date.now() - lpStart;

      // ✅ 5초 전에 떼면 → 일반 메시지 전송
      if (elapsed < LP_MS) {
        resetBtn();
        doSend(false);   // ⭐ 이게 핵심
        setStatus('loading', '전송 중... 🚀');
      }
    };
          // 🔥 손을 어디서 떼든 무조건 감지
      window.addEventListener('mouseup', onPressEnd);
      window.addEventListener('touchend', onPressEnd);
      window.addEventListener('touchcancel', onPressEnd);
      
    function resetBtn() {
      document.getElementById('mainBtn').className = 'house-btn';
      document.getElementById('btnEmoji').textContent = '🏠';
      document.getElementById('btnLabel').textContent = '집에 간다!';
      document.getElementById('btnSub').textContent = '꾹 → 긴급!';
      document.getElementById('pressRing').classList.remove('active');
      document.getElementById('pressFill').style.strokeDashoffset = CIRC;
    }

    async function doSend(isEmergency) {
      const btn = document.getElementById('mainBtn');
      if (!isEmergency) {
        btn.disabled = true;
        document.getElementById('sendingOverlay').classList.add('active');
        setStatus('loading', 'GPS 찍는 중... 🛰️');
      }
      try {
        const pos = await getGPS();
        const { latitude, longitude } = pos.coords;
        const address = await reverseGeocode(latitude, longitude);

        const emergMsg = '🚨 긴급!! 병철이에게 무슨일이 생겼나봐요!! 얼른 전화해보세요!!';
        const message = isEmergency ? emergMsg : SEND_MSGS[Math.floor(Math.random() * SEND_MSGS.length)];
        await addDoc(collection(db, "home_events"), {
          from: MY_USER, to: "yj",
          latitude, longitude,
          accuracy: Math.round(pos.coords.accuracy),
          mapsUrl: `https://maps.google.com/?q=${latitude},${longitude}`,
          address,
          message,
          emergency: isEmergency,
          timestamp: serverTimestamp()
        });

        document.getElementById('sendingOverlay').classList.remove('active');
        document.getElementById('successMsg').innerHTML =
          `yj한테 알림 보냈어요~<br/><strong style="color:var(--blue-dark)">${message}</strong><br/><span style="font-size:0.85rem;color:var(--muted)">📍 ${address ? address : `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`}</span>`;
        document.getElementById('successOverlay').classList.add('active');
        setStatus('success', '전송 완료! ✅');

        setTimeout(() => {
          document.getElementById('successOverlay').classList.remove('active');
          if (!isEmergency) btn.disabled = false;
          setStatus('', '대기 중 ☁️');
        }, 5000);

      } catch(e) {
        document.getElementById('sendingOverlay').classList.remove('active');
        if (!isEmergency) btn.disabled = false;
        if (e.code === 1) setStatus('error', '📍 위치 권한 허용해주세요!');
        else setStatus('error', '전송 실패... 다시 눌러봐요 🥲');
        console.error(e);
      }
    }

    window.registerToken = async function() {
      const btn = document.getElementById('regBtn');
      btn.textContent = '등록 중... 🔄';
      btn.disabled = true;
      try {
        if (!('serviceWorker' in navigator)) throw new Error('이 브라우저는 서비스워커를 지원하지 않습니다');
        if (!('PushManager' in window)) throw new Error('이 브라우저는 푸시 API를 지원하지 않습니다');

        const { getMessaging, getToken } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js");
        const messaging = getMessaging(app);
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') throw new Error('권한 거부');
        const sw = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: sw });
        console.log('FCM token registered', { user: MY_USER, token, sw });
        await addDoc(collection(db, "receiver_tokens"), {
          user: MY_USER, token, registeredAt: new Date().toISOString()
        });
        localStorage.setItem('home_token_ok', '1');
        btn.textContent = '✅ 알림 등록 완료!';
        btn.classList.add('done');
      } catch(e) {
        btn.disabled = false;
        btn.textContent = '🔔 알림 수신 등록하기 (재시도)';
        const message = e?.message || String(e);
        setStatus('error', `등록 실패: ${message}`);
        console.error('registerToken error', e);
      }
    };

    if (localStorage.getItem('home_token_ok')) {
      const btn = document.getElementById('regBtn');
      btn.textContent = '✅ 알림 등록 완료!';
      btn.classList.add('done');
    }

    async function reverseGeocode(latitude, longitude) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=ko&zoom=16`
        );
        if (!res.ok) return null;
        const data = await res.json();
        const addr = data.address || {};
        const parts = [];
        if (addr.state) parts.push(addr.state);
        if (addr.city) parts.push(addr.city);
        else if (addr.county) parts.push(addr.county);
        if (addr.city_district) parts.push(addr.city_district);
        else if (addr.suburb) parts.push(addr.suburb);
        if (addr.neighbourhood) parts.push(addr.neighbourhood);
        if (addr.road) parts.push(addr.road);
        return parts.filter(Boolean).join(' ') || data.display_name || null;
      } catch {
        return null;
      }
    }

    function getGPS() {
      return new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000 })
      );
    }

    function setStatus(type, text) {
      document.getElementById('statusPill').className = 'status-pill ' + type;
      document.getElementById('statusText').textContent = text;
    }
  </script>
</body>
</html>
